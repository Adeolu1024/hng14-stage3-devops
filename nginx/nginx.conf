worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # JSON log format for anomaly detection
    log_format json_anomaly escape=json '{'
        '"source_ip":"$remote_addr",'
        '"timestamp":"$time_iso8601",'
        '"method":"$request_method",'
        '"path":"$request_uri",'
        '"status":$status,'
        '"response_size":$body_bytes_sent,'
        '"user_agent":"$http_user_agent",'
        '"x_forwarded_for":"$http_x_forwarded_for",'
        '"request_time":$request_time'
    '}';

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 512M;

    upstream nextcloud {
        server nextcloud-app:80;
    }

    # Nextcloud - accessible by IP only
    server {
        listen 80 default_server;
        server_name _;

        # JSON access log written to shared volume
        access_log /var/log/nginx/hng-access.log json_anomaly;

        # Trust X-Forwarded-For from upstream proxies
        real_ip_header X-Forwarded-For;
        set_real_ip_from 0.0.0.0/0;

        # Security headers
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Strict-Transport-Security "max-age=15768000; includeSubDomains" always;

        # Proxy to Nextcloud
        location / {
            proxy_pass http://nextcloud;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 'OK';
            add_header Content-Type text/plain;
        }
    }

    # Dashboard - HTTP redirect to HTTPS
    server {
        listen 80;
        server_name abimbola-project1.xyz;

        # Certbot ACME challenge (for certificate renewal)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect everything else to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # Dashboard - HTTPS with SSL
    server {
        listen 443 ssl;
        server_name abimbola-project1.xyz;

        ssl_certificate /etc/letsencrypt/live/abimbola-project1.xyz/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/abimbola-project1.xyz/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        access_log /var/log/nginx/dashboard-access.log;

        location / {
            proxy_pass http://172.17.0.1:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
