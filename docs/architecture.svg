<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" font-family="monospace" font-size="14">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="700" fill="#f8f9fa"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1a2e">HNG Anomaly Detection Engine - Architecture</text>

  <!-- Client -->
  <rect x="350" y="60" width="200" height="50" rx="8" fill="#4a90d9"/>
  <text x="450" y="90" text-anchor="middle" fill="white" font-weight="bold">HTTP Clients (Users/Attackers)</text>

  <!-- Arrow down -->
  <line x1="450" y1="110" x2="450" y2="150" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Nginx -->
  <rect x="300" y="150" width="300" height="80" rx="8" fill="#00c853"/>
  <text x="450" y="180" text-anchor="middle" fill="white" font-weight="bold" font-size="16">Nginx Reverse Proxy (Docker)</text>
  <text x="450" y="205" text-anchor="middle" fill="white" font-size="12">JSON logs → HNG-nginx-logs volume</text>
  <text x="450" y="222" text-anchor="middle" fill="white" font-size="12">X-Forwarded-For → real client IP</text>

  <!-- Arrow down to Nextcloud -->
  <line x1="370" y1="230" x2="370" y2="290" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="310" y="270" text-anchor="middle" font-size="11" fill="#555">proxy_pass</text>

  <!-- Arrow right to volume -->
  <line x1="600" y1="190" x2="680" y2="190" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Nextcloud -->
  <rect x="250" y="290" width="240" height="60" rx="8" fill="#ff9800"/>
  <text x="370" y="315" text-anchor="middle" fill="white" font-weight="bold">Nextcloud (Docker)</text>
  <text x="370" y="337" text-anchor="middle" fill="white" font-size="12">mounts HNG-nginx-logs:ro</text>

  <!-- DB -->
  <rect x="250" y="380" width="240" height="60" rx="8" fill="#9c27b0"/>
  <text x="370" y="405" text-anchor="middle" fill="white" font-weight="bold">MariaDB (Docker)</text>
  <text x="370" y="427" text-anchor="middle" fill="white" font-size="12">nextcloud-data volume</text>
  <line x1="370" y1="350" x2="370" y2="380" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Volume -->
  <rect x="680" y="150" width="180" height="80" rx="8" fill="#607d8b"/>
  <text x="770" y="180" text-anchor="middle" fill="white" font-weight="bold">HNG-nginx-logs</text>
  <text x="770" y="200" text-anchor="middle" fill="white" font-size="11">Named Docker Volume</text>
  <text x="770" y="218" text-anchor="middle" fill="white" font-size="11">hng-access.log (JSON)</text>

  <!-- Arrow down to Detector -->
  <line x1="770" y1="230" x2="770" y2="310" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="820" y="280" text-anchor="middle" font-size="11" fill="#555">read-only</text>

  <!-- Detector (Host) -->
  <rect x="620" y="310" width="300" height="200" rx="8" fill="#e91e63"/>
  <text x="770" y="340" text-anchor="middle" fill="white" font-weight="bold" font-size="16">Detector Daemon (Host)</text>

  <!-- Detector components -->
  <rect x="640" y="355" width="120" height="35" rx="4" fill="#fff" opacity="0.9"/>
  <text x="700" y="377" text-anchor="middle" font-size="11" fill="#333">Log Monitor</text>

  <rect x="780" y="355" width="120" height="35" rx="4" fill="#fff" opacity="0.9"/>
  <text x="840" y="377" text-anchor="middle" font-size="11" fill="#333">Sliding Window</text>

  <rect x="640" y="400" width="120" height="35" rx="4" fill="#fff" opacity="0.9"/>
  <text x="700" y="422" text-anchor="middle" font-size="11" fill="#333">Rolling Baseline</text>

  <rect x="780" y="400" width="120" height="35" rx="4" fill="#fff" opacity="0.9"/>
  <text x="840" y="422" text-anchor="middle" font-size="11" fill="#333">Anomaly Detector</text>

  <rect x="640" y="445" width="120" height="35" rx="4" fill="#fff" opacity="0.9"/>
  <text x="700" y="467" text-anchor="middle" font-size="11" fill="#333">IP Blocker</text>

  <rect x="780" y="445" width="120" height="35" rx="4" fill="#fff" opacity="0.9"/>
  <text x="840" y="467" text-anchor="middle" font-size="11" fill="#333">Auto-Unbanner</text>

  <rect x="710" y="490" width="120" height="35" rx="4" fill="#fff" opacity="0.9"/>
  <text x="770" y="512" text-anchor="middle" font-size="11" fill="#333">Dashboard (:8080)</text>

  <!-- Arrows from Detector to iptables and Slack -->
  <line x1="640" y1="462" x2="560" y2="462" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="920" y1="462" x2="920" y2="462" stroke="none"/>

  <!-- iptables -->
  <rect x="430" y="440" width="130" height="50" rx="8" fill="#f44336"/>
  <text x="495" y="462" text-anchor="middle" fill="white" font-weight="bold">iptables DROP</text>
  <text x="495" y="480" text-anchor="middle" fill="white" font-size="11">Host Firewall</text>

  <!-- Slack -->
  <rect x="430" y="520" width="130" height="50" rx="8" fill="#611f69"/>
  <text x="495" y="542" text-anchor="middle" fill="white" font-weight="bold">Slack Webhook</text>
  <text x="495" y="560" text-anchor="middle" fill="white" font-size="11">Alerts &amp; Notifications</text>

  <!-- Arrow from detector to Slack -->
  <line x1="770" y1="525" x2="560" y2="545" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Dashboard proxy arrow -->
  <line x1="770" y1="525" x2="770" y2="580" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="680" y="580" width="180" height="40" rx="8" fill="#2196f3"/>
  <text x="770" y="605" text-anchor="middle" fill="white" font-weight="bold">Nginx Proxy → monitor.yourdomain.com</text>

  <!-- Docker boundary -->
  <rect x="220" y="140" width="440" height="320" rx="12" fill="none" stroke="#333" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="240" y="165" font-size="12" fill="#333" font-weight="bold">Docker Compose Stack</text>

  <!-- Host boundary -->
  <rect x="600" y="290" width="340" height="250" rx="12" fill="none" stroke="#e91e63" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="620" y="310" font-size="12" fill="#e91e63" font-weight="bold">Host System</text>

  <!-- Legend -->
  <rect x="20" y="620" width="200" height="70" rx="4" fill="white" stroke="#ccc"/>
  <text x="30" y="645" font-size="12" font-weight="bold">Legend:</text>
  <rect x="30" y="655" width="15" height="15" fill="#00c853" rx="3"/>
  <text x="55" y="667" font-size="11">Nginx (Docker)</text>
  <rect x="30" y="675" width="15" height="15" fill="#e91e63" rx="3"/>
  <text x="55" y="687" font-size="11">Detector (Host)</text>
  <rect x="130" y="655" width="15" height="15" fill="#ff9800" rx="3"/>
  <text x="155" y="667" font-size="11">Nextcloud</text>
  <rect x="130" y="675" width="15" height="15" fill="#f44336" rx="3"/>
  <text x="155" y="687" font-size="11">iptables</text>
</svg>
