version: "3.8"

services:
  nextcloud-app:
    image: kefaslungu/hng-nextcloud:latest
    container_name: hng-nextcloud
    restart: unless-stopped
    volumes:
      - nextcloud-data:/var/www/html
      - HNG-nginx-logs:/var/log/nginx:ro
    environment:
      - MYSQL_HOST=db
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
      - MYSQL_PASSWORD=nextcloud_secret
      - NEXTCLOUD_ADMIN_USER=admin
      - NEXTCLOUD_ADMIN_PASSWORD=admin123
      - TRUSTED_PROXIES=nginx
    depends_on:
      - db
    networks:
      - hng-network

  db:
    image: mariadb:10.11
    container_name: hng-db
    restart: unless-stopped
    command: --transaction-isolation=READ-COMMITTED --binlog-format=ROW
    volumes:
      - db-data:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=root_secret
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
      - MYSQL_PASSWORD=nextcloud_secret
    networks:
      - hng-network

  nginx:
    image: nginx:alpine
    container_name: hng-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - HNG-nginx-logs:/var/log/nginx
      - /etc/letsencrypt:/etc/letsencrypt:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - nextcloud-app
    networks:
      - hng-network

volumes:
  nextcloud-data:
  db-data:
  HNG-nginx-logs:
    name: HNG-nginx-logs

networks:
  hng-network:
    driver: bridge
